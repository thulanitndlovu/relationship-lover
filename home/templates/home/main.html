<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lover Corner - Main</title>
    <style>
        body {
            background: #fff5f7;
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            background: #ff4d6d;
            padding: 20px;
            text-align: center;
            color: white;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .container {
            width: 80%;
            margin: 40px auto;
            text-align: center;
        }

        h2 {
            font-size: 26px;
            margin-bottom: 20px;
        }

        .menu {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        .menu a {
            background: #ff4d6d;
            padding: 15px 25px;
            color: white;
            font-size: 18px;
            text-decoration: none;
            border-radius: 10px;
            transition: 0.3s;
        }

        .menu a:hover {
            background: #c9184a;
        }
    </style>
</head>

<body>

<header>
    🌹 Lover Corner – Main Page 🌹
</header>

<div class="container">
    <h2>Welcome! Connect, browse, and find your perfect match.</h2>

    <div class="menu">
        <a href="/browse/">Browse Profiles</a>
        <a href="/profile/">View Profile</a>
        <a href="/profile/edit/">Edit Profile</a>
        <a href="/messages/">Messages</a>
        <a href="/logout/">Logout</a>
    </div>
</div>

</body>
</html>
