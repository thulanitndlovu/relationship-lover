<!DOCTYPE html>
<html>
<head>
<title>Send Message</title>

<style>

body{
font-family:Arial;
background:#fff0f3;
}

.container{
width:500px;
margin:50px auto;
background:white;
padding:25px;
border-radius:10px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

textarea{
width:100%;
height:120px;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
margin-top:10px;
padding:10px 20px;
background:#6c63ff;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h2>Send Message to {{ receiver.username }}</h2>

<form method="POST">

{% csrf_token %}

<textarea name="message" placeholder="Write your message..."></textarea>

<br>

<button type="submit">Send Message 💬</button>

</form>

</div>

</body>
</html>
